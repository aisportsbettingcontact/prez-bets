<body>
<div id="card"></div>
<script>
// window.LINEUP_DATA is injected by renderLineupCard.ts before this script runs
const d = window.LINEUP_DATA;

function el(tag, style, children, attrs) {
  const e = document.createElement(tag);
  if (style) Object.assign(e.style, style);
  if (attrs) Object.keys(attrs).forEach(k => e.setAttribute(k, attrs[k]));
  if (typeof children === 'string') e.textContent = children;
  else if (Array.isArray(children)) children.filter(Boolean).forEach(c => e.appendChild(c));
  else if (children) e.appendChild(children);
  return e;
}

function pill(text, bg, color, border) {
  return el('span', {
    fontSize: '8px', fontWeight: '700', letterSpacing: '1.5px',
    textTransform: 'uppercase', padding: '2px 6px', borderRadius: '3px',
    background: bg, color: color, border: `1px solid ${border}`,
    display: 'inline-block', lineHeight: '1.4',
  }, text);
}

function mlbPhoto(id) {
  if (!id) return null;
  // w_360 = 3× more pixels → crisp at 4x DPR (360px source / 4 DPR = 90px display, sharp)
  return `https://img.mlbstatic.com/mlb-photos/image/upload/d_people:generic:headshot:67:current.png/w_360,q_auto:best,e_background_removal,f_png/v1/people/${id}/headshot/67/current`;
}

function playerAvatar(mlbamId, size) {
  const url = mlbPhoto(mlbamId);
  if (!url) {
    return el('div', { width: size+'px', height: size+'px', flexShrink: '0', background: 'transparent' });
  }
  const img = el('img', {
    width: size+'px', height: size+'px', flexShrink: '0',
    display: 'block', objectFit: 'contain',
    borderRadius: `0 0 ${Math.round(size*0.35)}px ${Math.round(size*0.35)}px`,
  }, null, { src: url, alt: '' });
  img.onerror = () => { img.style.display = 'none'; };
  return img;
}

function teamLogoCircle(team, size) {
  const circle = el('div', {
    width: size+'px', height: size+'px', borderRadius: '50%',
    display: 'flex', alignItems: 'center', justifyContent: 'center',
    background: `radial-gradient(circle at 35% 35%, ${team.primaryColor}, ${team.darkColor})`,
    flexShrink: '0', overflow: 'hidden',
  });
  const logoSize = Math.round(size * 0.65);
  const img = el('img', { width: logoSize+'px', height: logoSize+'px', objectFit: 'contain' },
    null, { src: team.logoUrl, alt: team.abbrev });
  img.onerror = () => { img.style.display = 'none'; };
  circle.appendChild(img);
  return circle;
}

function pitcherSection(pitcher) {
  const name = pitcher.name || 'TBD';
  const era = pitcher.era || '—';
  const section = el('div', { padding: '10px 12px', display: 'flex', flexDirection: 'column' });
  const label = el('div', {
    fontSize: '10px', fontWeight: '600', letterSpacing: '1.5px',
    textTransform: 'uppercase', color: '#FFFFFF', marginBottom: '6px',
  }, 'Starting Pitcher');
  const row = el('div', { display: 'flex', alignItems: 'center', gap: '10px' });
  const avatar = playerAvatar(pitcher.mlbamId, 72); // 72px CSS × 4x DPR = 288px physical
  const info = el('div', { flex: '1', minWidth: '0' });
  const pName = el('div', {
    fontFamily: '"Barlow Condensed", sans-serif', fontSize: '18px', fontWeight: '800',
    color: '#FFFFFF', lineHeight: '1.1', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis',
  }, name);
  const eraEl = el('div', { fontSize: '12px', color: 'rgba(255,255,255,0.4)', marginTop: '2px' }, era);
  const badges = el('div', { display: 'flex', gap: '5px', alignItems: 'center', marginTop: '4px' });
  if (pitcher.hand) {
    badges.appendChild(pill(pitcher.hand + 'HP', '#101820', '#FFFFFF', '#182433'));
  }
  if (pitcher.confirmed) {
    const conf = el('span', {
      fontSize: '8px', fontWeight: '600', letterSpacing: '0.5px',
      color: '#39FF14', display: 'inline-flex', alignItems: 'center', gap: '3px',
    });
    const dot = el('span', { width: '5px', height: '5px', borderRadius: '50%', background: '#39FF14', display: 'inline-block' });
    conf.appendChild(dot);
    conf.appendChild(document.createTextNode('Confirmed'));
    badges.appendChild(conf);
  }
  info.appendChild(pName);
  info.appendChild(eraEl);
  info.appendChild(badges);
  row.appendChild(avatar);
  row.appendChild(info);
  section.appendChild(label);
  section.appendChild(row);
  return section;
}

function lineupRows(players) {
  const container = el('div', { padding: '6px 10px' });
  if (!players || players.length === 0) {
    const empty = el('div', {
      padding: '12px 8px', display: 'flex', alignItems: 'center',
      justifyContent: 'center', minHeight: '60px',
    });
    empty.appendChild(el('span', {
      fontSize: '9px', color: '#FFFFFF', fontWeight: '600',
      letterSpacing: '1px', textTransform: 'uppercase',
    }, 'Lineup Pending'));
    container.appendChild(empty);
    return container;
  }
  players.forEach((p, i) => {
    const row = el('div', {
      display: 'flex', alignItems: 'center', gap: '6px',
      padding: '5px 0',
      borderBottom: i < players.length - 1 ? '1px solid rgba(24,36,51,0.6)' : 'none',
    });
    row.appendChild(el('span', {
      fontFamily: '"Barlow Condensed", sans-serif', fontSize: '13px', fontWeight: '700',
      color: '#FFFFFF', width: '16px', flexShrink: '0', textAlign: 'right',
    }, String(p.battingOrder)));
    row.appendChild(playerAvatar(p.mlbamId, 48)); // 48px CSS × 4x DPR = 192px physical
    row.appendChild(el('span', {
      fontFamily: '"Barlow Condensed", sans-serif', fontSize: '13px', fontWeight: '700',
      letterSpacing: '0.5px', textTransform: 'uppercase', color: '#7EB8D4',
      background: 'rgba(30,60,90,0.6)', padding: '2px 6px', borderRadius: '3px',
      border: '1px solid rgba(30,80,120,0.4)', flexShrink: '0',
      textAlign: 'center', minWidth: '32px',
    }, p.position));
    row.appendChild(el('span', {
      fontFamily: '"Barlow Condensed", sans-serif', fontSize: '16px', fontWeight: '800',
      color: '#FFFFFF', flex: '1', whiteSpace: 'nowrap', overflow: 'hidden',
      textOverflow: 'ellipsis', textAlign: 'left', minWidth: '0',
    }, p.name));
    row.appendChild(el('span', {
      fontFamily: '"Barlow Condensed", sans-serif', fontSize: '14px', fontWeight: '800',
      color: '#FFFFFF', flexShrink: '0', width: '14px', textAlign: 'right',
    }, p.bats));
    container.appendChild(row);
  });
  return container;
}

function weatherStrip(weather) {
  if (!weather) return null;
  const { icon, temp, wind, precip, dome } = weather;
  if (dome) {
    const strip = el('div', {
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      gap: '8px', padding: '10px 18px', background: '#0C1219',
    });
    strip.appendChild(el('span', { fontSize: '16px' }, '🏟️'));
    strip.appendChild(el('span', {
      fontFamily: '"Barlow Condensed", sans-serif', fontSize: '13px', fontWeight: '700', color: '#FFFFFF',
    }, 'Dome'));
    strip.appendChild(el('span', { fontSize: '10px', color: 'rgba(255,255,255,0.4)' }, 'Indoor stadium'));
    return strip;
  }
  if (!temp && !wind && precip == null) return null;
  const precipColor = precip == null ? '#FFFFFF' : precip === 0 ? '#39FF14' : precip < 30 ? '#FFCC00' : '#FF2D55';
  const strip = el('div', {
    display: 'flex', alignItems: 'center', justifyContent: 'center',
    gap: '24px', padding: '10px 18px', background: '#0C1219',
  });
  if (icon || temp || wind) {
    const left = el('div', { display: 'flex', alignItems: 'center', gap: '8px' });
    if (icon) left.appendChild(el('span', { fontSize: '20px', lineHeight: '1' }, icon));
    const temps = el('div');
    if (temp) temps.appendChild(el('div', {
      fontFamily: '"Barlow Condensed", sans-serif', fontSize: '16px', fontWeight: '700', color: '#FFFFFF',
    }, temp));
    if (wind) temps.appendChild(el('div', { fontSize: '10px', color: 'rgba(255,255,255,0.4)', marginTop: '1px' }, wind));
    left.appendChild(temps);
    strip.appendChild(left);
  }
  if (precip != null) {
    strip.appendChild(el('div', { width: '1px', height: '28px', background: '#1E3048' }));
    const precipEl = el('div');
    precipEl.appendChild(el('div', {
      fontFamily: '"Barlow Condensed", sans-serif', fontSize: '13px', fontWeight: '700',
      textAlign: 'center', color: precipColor,
    }, precip + '%'));
    precipEl.appendChild(el('div', {
      fontSize: '9px', color: 'rgba(255,255,255,0.3)', letterSpacing: '1px',
      textTransform: 'uppercase', marginTop: '1px', textAlign: 'center',
    }, 'Precip'));
    strip.appendChild(precipEl);
  }
  return strip;
}

function buildCard(data) {
  const { away, home, startTime, lineup } = data;
  const card = el('div', {
    background: '#090E14', borderRadius: '12px',
    border: '1px solid #182433', overflow: 'hidden', width: '680px',
  });
  // Color top bar
  card.appendChild(el('div', {
    height: '3px',
    background: `linear-gradient(90deg, ${away.primaryColor} 48%, ${home.primaryColor} 52%)`,
  }));
  // Header
  const header = el('div', {
    display: 'grid', gridTemplateColumns: '1fr auto 1fr',
    alignItems: 'center', padding: '14px 18px 12px',
    borderBottom: '1px solid #182433', gap: '10px',
  });
  // Away
  const awayCol = el('div', { display: 'flex', alignItems: 'center', gap: '12px' });
  awayCol.appendChild(teamLogoCircle(away, 52)); // 52px CSS × 4x DPR = 208px physical
  const awayInfo = el('div');
  awayInfo.appendChild(el('div', {
    fontFamily: '"Barlow Condensed", sans-serif', fontSize: '16px', fontWeight: '900',
    letterSpacing: '0.5px', textTransform: 'uppercase', color: '#FFFFFF', lineHeight: '1.1',
  }, away.city));
  awayInfo.appendChild(el('div', {
    fontFamily: '"Barlow Condensed", sans-serif', fontSize: '13px', fontWeight: '400',
    color: 'rgba(255,255,255,0.5)', letterSpacing: '0.5px', marginTop: '1px',
  }, away.nickname));
  awayInfo.appendChild(pill('Away', away.primaryColor + '22', '#FFFFFF', away.primaryColor + '44'));
  awayCol.appendChild(awayInfo);
  // Center
  const center = el('div', { textAlign: 'center' });
  center.appendChild(el('div', {
    fontFamily: '"Barlow Condensed", sans-serif', fontSize: '15px', fontWeight: '700',
    color: '#FFFFFF', letterSpacing: '1px', whiteSpace: 'nowrap',
  }, startTime));
  center.appendChild(el('div', {
    fontFamily: '"Barlow Condensed", sans-serif', fontSize: '13px',
    color: '#FFFFFF', letterSpacing: '3px', marginTop: '3px',
  }, '@'));
  // Home
  const homeCol = el('div', { display: 'flex', alignItems: 'center', gap: '12px', flexDirection: 'row-reverse' });
  homeCol.appendChild(teamLogoCircle(home, 52)); // 52px CSS × 4x DPR = 208px physical
  const homeInfo = el('div', { textAlign: 'right' });
  homeInfo.appendChild(el('div', {
    fontFamily: '"Barlow Condensed", sans-serif', fontSize: '16px', fontWeight: '900',
    letterSpacing: '0.5px', textTransform: 'uppercase', color: '#FFFFFF', lineHeight: '1.1',
  }, home.city));
  homeInfo.appendChild(el('div', {
    fontFamily: '"Barlow Condensed", sans-serif', fontSize: '13px', fontWeight: '400',
    color: 'rgba(255,255,255,0.5)', letterSpacing: '0.5px', marginTop: '1px',
  }, home.nickname));
  homeInfo.appendChild(pill('Home', home.primaryColor + '22', '#FFFFFF', home.primaryColor + '44'));
  homeCol.appendChild(homeInfo);
  header.appendChild(awayCol);
  header.appendChild(center);
  header.appendChild(homeCol);
  card.appendChild(header);
  // Pitchers
  const pitchers = el('div', {
    display: 'grid', gridTemplateColumns: '1fr 1px 1fr',
    borderBottom: '1px solid #182433',
  });
  pitchers.appendChild(pitcherSection(lineup.awayPitcher));
  pitchers.appendChild(el('div', { background: '#182433' }));
  pitchers.appendChild(pitcherSection(lineup.homePitcher));
  card.appendChild(pitchers);
  // Lineups
  const lineups = el('div', {
    display: 'grid', gridTemplateColumns: '1fr 1px 1fr',
    borderBottom: '1px solid #182433',
  });
  lineups.appendChild(lineupRows(lineup.awayPlayers));
  lineups.appendChild(el('div', { background: '#182433' }));
  lineups.appendChild(lineupRows(lineup.homePlayers));
  card.appendChild(lineups);
  // Weather
  const weather = weatherStrip(lineup.weather);
  if (weather) card.appendChild(weather);
  return card;
}

const cardEl = buildCard(window.LINEUP_DATA);
document.getElementById('card').appendChild(cardEl);
</script>
