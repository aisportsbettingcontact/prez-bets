name: Dependabot Auto-Merge (Patch Only)

# ─── Trigger ──────────────────────────────────────────────────────────────────
# Fires on every Dependabot PR. The job gates on:
#   1. PR is opened by dependabot[bot]
#   2. Version bump is patch-level only (semver: x.y.Z)
#   3. All CI checks pass (enforced by `gh pr merge --auto`)
on:
  pull_request:
    types: [opened, synchronize, reopened]

# ─── Permissions ──────────────────────────────────────────────────────────────
# contents:write  — needed to merge the PR
# pull-requests:write — needed to approve and merge
permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge Dependabot patch PRs
    runs-on: ubuntu-latest

    # Only run for Dependabot PRs — skip all human-authored PRs
    if: github.actor == 'dependabot[bot]'

    steps:
      # ── Step 1: Fetch Dependabot metadata ─────────────────────────────────
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 2: Log decision context ──────────────────────────────────────
      - name: Log PR metadata
        run: |
          echo "[INPUT] PR number:        ${{ github.event.pull_request.number }}"
          echo "[INPUT] PR title:         ${{ github.event.pull_request.title }}"
          echo "[INPUT] Dependency name:  ${{ steps.meta.outputs.dependency-names }}"
          echo "[INPUT] Update type:      ${{ steps.meta.outputs.update-type }}"
          echo "[INPUT] Semver change:    ${{ steps.meta.outputs.new-version }} (was ${{ steps.meta.outputs.previous-version }})"
          echo "[STATE] Ecosystem:        ${{ steps.meta.outputs.package-ecosystem }}"
          echo "[STATE] Actor:            ${{ github.actor }}"

      # ── Step 3: Approve patch-only PRs ────────────────────────────────────
      # Approves the PR so the merge step can proceed.
      # Only patch updates are approved — minor and major require manual review.
      - name: Approve patch update
        if: steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: |
          echo "[STEP] Approving patch-level PR #${{ github.event.pull_request.number }}..."
          gh pr review "${{ github.event.pull_request.number }}" \
            --approve \
            --body "Auto-approved: patch-level dependency update (semver-patch). CI must pass before merge."
          echo "[OUTPUT] PR approved"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 4: Enable auto-merge (squash) ────────────────────────────────
      # `--auto` waits for all required status checks to pass before merging.
      # Uses squash to keep the commit history clean.
      # Only runs for patch updates — minor/major are skipped entirely.
      - name: Enable auto-merge for patch update
        if: steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: |
          echo "[STEP] Enabling auto-merge (squash) for PR #${{ github.event.pull_request.number }}..."
          gh pr merge "${{ github.event.pull_request.number }}" \
            --auto \
            --squash \
            --subject "chore(deps): ${{ github.event.pull_request.title }}" \
            --body "Auto-merged by Dependabot auto-merge workflow. Patch-level update. All CI checks passed."
          echo "[OUTPUT] Auto-merge enabled — will merge once CI passes"
          echo "[VERIFY] PASS — PR #${{ github.event.pull_request.number }} queued for auto-merge"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 5: Log skip reason for non-patch updates ─────────────────────
      - name: Skip non-patch update
        if: steps.meta.outputs.update-type != 'version-update:semver-patch'
        run: |
          echo "[STEP] Skipping auto-merge — update type is not patch-level"
          echo "[STATE] update-type: ${{ steps.meta.outputs.update-type }}"
          echo "[STATE] Dependency: ${{ steps.meta.outputs.dependency-names }}"
          echo "[STATE] ${{ steps.meta.outputs.previous-version }} → ${{ steps.meta.outputs.new-version }}"
          echo "[OUTPUT] Manual review required for minor/major updates"
          echo "[VERIFY] SKIP — no action taken"
