# ─── Weekly Security Audit — aisportsbettingmodels.com ───────────────────────
#
# Purpose:
#   Runs a broader dependency vulnerability scan at MODERATE severity level
#   every Monday at 09:00 UTC. This catches newly disclosed MODERATE CVEs that
#   the daily CI audit (--audit-level=high) intentionally skips to avoid
#   blocking development on unfixable transitive dependencies.
#
# Difference from ci.yml:
#   ci.yml       — blocks PRs/pushes on HIGH + CRITICAL only (developer-facing gate)
#   this workflow — weekly scan at MODERATE, produces a full report, does NOT
#                   block development but surfaces emerging risks before they
#                   escalate to HIGH/CRITICAL
#
# Triggers:
#   - Weekly cron: every Monday at 09:00 UTC
#   - Manual dispatch: run on-demand at any time via GitHub Actions UI
#
# Outputs:
#   - Full audit report uploaded as a GitHub Actions artifact (30-day retention)
#   - Structured summary printed to the job log with severity breakdown
#   - Job exits non-zero if any MODERATE, HIGH, or CRITICAL CVE is found
#     (so the weekly run shows as "failed" in GitHub UI when action is needed)
#
# Secrets required (same as ci.yml):
#   None — pnpm audit does not require database or auth secrets
#
# ─────────────────────────────────────────────────────────────────────────────

name: Weekly Security Audit (moderate+)

on:
  schedule:
    # Every Monday at 09:00 UTC
    # Cron format: seconds(0-59) minutes(0-59) hours(0-23) day(1-31) month(1-12) weekday(0-6)
    # GitHub Actions uses standard 5-field cron (no seconds field)
    - cron: "0 9 * * 1"
  workflow_dispatch:
    inputs:
      audit_level:
        description: "Minimum severity level to report (low | moderate | high | critical)"
        required: false
        default: "moderate"
        type: choice
        options:
          - low
          - moderate
          - high
          - critical

# Cancel any in-progress weekly audit for the same ref (prevents queue buildup
# if manual dispatch is triggered while a scheduled run is already in progress).
concurrency:
  group: weekly-audit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  weekly-security-audit:
    name: "Weekly Audit — pnpm audit --audit-level=${{ inputs.audit_level || 'moderate' }}"
    runs-on: ubuntu-latest

    steps:
      - name: "[INPUT] Checkout repository at HEAD"
        uses: actions/checkout@v4

      - name: "[STEP] Setup pnpm"
        uses: pnpm/action-setup@v6
        # No 'version' key — packageManager in package.json is the single source of truth.
        # Specifying version here conflicts with the packageManager field and causes
        # ERR_PNPM_BAD_PM_VERSION in pnpm/action-setup@v4.

      - name: "[STEP] Setup Node.js 22 with pnpm cache"
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: "[STEP] Install dependencies (frozen lockfile — no accidental upgrades)"
        run: pnpm install --frozen-lockfile

      - name: "[STEP] Run full dependency audit at moderate+ severity"
        # --audit-level: report and fail on MODERATE, HIGH, and CRITICAL CVEs.
        # LOW is intentionally excluded — low-severity advisories in transitive
        # deps are typically unfixable noise (e.g. old test utilities).
        #
        # The full audit output is captured to audit-full.txt for artifact upload.
        # A structured summary is also extracted and printed to the job log.
        #
        # [VERIFY] Exit code:
        #   0 = no vulnerabilities at or above the specified level
        #   1 = vulnerabilities found — job fails, GitHub shows red X
        #
        # This intentional failure is the signal to review the report artifact
        # and either update the affected package or add a documented exception.
        run: |
          AUDIT_LEVEL="${{ inputs.audit_level || 'moderate' }}"
          echo "[INPUT] Audit level: ${AUDIT_LEVEL}"
          echo "[INPUT] Repository: ${{ github.repository }}"
          echo "[INPUT] Ref: ${{ github.ref }}"
          echo "[INPUT] Run date: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "───────────────────────────────────────────────────────────────"

          # Run audit and capture full output
          echo "[STEP] Running: pnpm audit --audit-level=${AUDIT_LEVEL}"
          pnpm audit --audit-level="${AUDIT_LEVEL}" 2>&1 | tee audit-full.txt
          AUDIT_EXIT_CODE=${PIPESTATUS[0]}

          echo "───────────────────────────────────────────────────────────────"
          echo "[STATE] Audit exit code: ${AUDIT_EXIT_CODE}"

          # Extract severity summary line from audit output
          SUMMARY=$(grep -oP '\d+ vulnerabilities found.*' audit-full.txt | tail -1 || echo "No summary line found")
          echo "[STATE] Vulnerability summary: ${SUMMARY}"

          # Count by severity for structured logging
          CRITICAL_COUNT=$(grep -c "^│ critical" audit-full.txt 2>/dev/null || echo "0")
          HIGH_COUNT=$(grep -c "^│ high" audit-full.txt 2>/dev/null || echo "0")
          MODERATE_COUNT=$(grep -c "^│ moderate" audit-full.txt 2>/dev/null || echo "0")
          LOW_COUNT=$(grep -c "^│ low" audit-full.txt 2>/dev/null || echo "0")

          echo "[STATE] Critical: ${CRITICAL_COUNT} | High: ${HIGH_COUNT} | Moderate: ${MODERATE_COUNT} | Low: ${LOW_COUNT}"

          if [ "${AUDIT_EXIT_CODE}" -ne 0 ]; then
            echo "[OUTPUT] FAIL — Vulnerabilities found at or above ${AUDIT_LEVEL} severity"
            echo "[OUTPUT] Action required: review audit-full.txt artifact and update affected packages"
            echo "[VERIFY] Run 'pnpm audit --fix' locally or update specific packages with 'pnpm add <pkg>@latest'"
            exit "${AUDIT_EXIT_CODE}"
          fi

          echo "[OUTPUT] PASS — No vulnerabilities found at or above ${AUDIT_LEVEL} severity"
          echo "[VERIFY] Dependency tree is clean at ${AUDIT_LEVEL}+ level as of $(date -u '+%Y-%m-%d')"

      - name: "[OUTPUT] Upload full audit report as artifact"
        # Always upload — even on failure — so the report is available for review
        # regardless of whether the job passed or failed.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "weekly-audit-report-${{ github.run_number }}-${{ github.run_attempt }}"
          path: audit-full.txt
          retention-days: 30

      - name: "[OUTPUT] Print audit report summary to job log"
        # Print the last 40 lines of the audit output to the job log so the
        # summary is visible without downloading the artifact.
        if: always()
        run: |
          echo "───────────────────────────────────────────────────────────────"
          echo "[OUTPUT] Audit report tail (last 40 lines):"
          echo "───────────────────────────────────────────────────────────────"
          tail -40 audit-full.txt || echo "(audit-full.txt not found)"
