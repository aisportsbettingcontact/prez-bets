<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>AI Sports Betting Models</title>
    <meta name="description" content="AI-powered sports betting model projections — spreads, totals, and edges." />
    <!-- Performance: preload Barlow Condensed 700 woff2 before stylesheet to prevent FOUT -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- font-display:optional prevents FOUT on slow connections (uses system font immediately) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600&family=JetBrains+Mono:wght@400;500&display=optional"
      rel="stylesheet"
    />
    <!-- GG Sans: Discord's proprietary font, served from our CDN (sourced from Discord's public assets) -->
    <style>
      @font-face {
        font-family: 'GG Sans';
        src: url('https://d2xsxph8kpxj0f.cloudfront.net/310519663397752079/MW3FicTy7ae3qrm8dx8Lua/ggsans-normal-400_4f9ee2e1.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'GG Sans';
        src: url('https://d2xsxph8kpxj0f.cloudfront.net/310519663397752079/MW3FicTy7ae3qrm8dx8Lua/ggsans-normal-500_32c749e5.woff2') format('woff2');
        font-weight: 500;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'GG Sans';
        src: url('https://d2xsxph8kpxj0f.cloudfront.net/310519663397752079/MW3FicTy7ae3qrm8dx8Lua/ggsans-normal-600_328a863d.woff2') format('woff2');
        font-weight: 600;

      }
      @font-face {
        font-family: 'GG Sans';
        src: url('https://d2xsxph8kpxj0f.cloudfront.net/310519663397752079/MW3FicTy7ae3qrm8dx8Lua/ggsans-normal-700_0f62247a.woff2') format('woff2');
        font-weight: 700;
        font-style: normal;
        font-display: swap;
      }
    </style>
  </head>
  <body>
    <!-- ═══════════════════════════════════════════════════════════════════
         HTML LOADING SHELL — renders IMMEDIATELY before any JS executes.
         Single unified loading state: covers JS parse, React hydration,
         Suspense (null fallback), auth check, and route resolution.
         Hides the moment React renders real visible content into #root.

         ARCHITECTURE:
         1. Shell renders at 0ms (pure HTML/CSS, no JS required)
         2. JS loads + React hydrates → Suspense fallback=null → #root empty
         3. Auth check fires (appUsers.me API call, ~100-300ms)
         4. Auth resolves → lazy page chunk loads → React renders content
         5. MutationObserver detects first non-empty child in #root subtree
         6. Shell fades out (200ms) → removed from DOM

         KEY: subtree:true + characterData:true catches React's text nodes
         and deeply nested renders, not just direct #root children.
         This handles the case where Suspense renders null (no direct child)
         but the lazy component eventually renders nested content.
         ═══════════════════════════════════════════════════════════════════ -->
    <style>
      #html-loading-shell {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #0a0a0f;
        z-index: 9999;
        transition: opacity 0.2s ease;
      }
      #html-loading-shell.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .html-shell-logo {
        width: 52px;
        height: 52px;
        border-radius: 12px;
        background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 16px;
        box-shadow: 0 0 32px rgba(59,130,246,0.35);
      }
      .html-shell-spinner {
        width: 24px;
        height: 24px;
        border: 2px solid rgba(255,255,255,0.1);
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: html-shell-spin 0.7s linear infinite;
      }
      @keyframes html-shell-spin {
        to { transform: rotate(360deg); }
      }
    </style>
    <div id="html-loading-shell">
      <div class="html-shell-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
             stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </div>
      <div class="html-shell-spinner"></div>
    </div>
    <!-- React mounts here. Once React renders real content, the loading shell fades out. -->
    <div id="root"></div>
    <script>
      // ─── HTML Shell Dismissal Logic ───────────────────────────────────────────
      // Strategy: observe #root with subtree:true so we catch React renders at
      // ANY depth — including when Suspense fallback=null renders nothing at the
      // top level but the lazy page eventually renders nested DOM nodes.
      //
      // We dismiss the shell when #root has actual visible content:
      //   - At least one element child anywhere in the subtree, AND
      //   - That element has non-zero dimensions (not just a React comment node)
      //
      // This prevents premature dismissal on React's internal fiber nodes.
      (function() {
        var shell = document.getElementById('html-loading-shell');
        var root  = document.getElementById('root');
        if (!shell || !root) return;

        var dismissed = false;
        function dismiss() {
          if (dismissed) return;
          dismissed = true;
          shell.classList.add('hidden');
          // Remove from DOM after fade completes (200ms transition)
          setTimeout(function() {
            if (shell.parentNode) shell.parentNode.removeChild(shell);
          }, 250);
          obs.disconnect();
        }

        function hasVisibleContent() {
          // Check if #root has any element descendants with actual content
          var allEls = root.querySelectorAll('*');
          for (var i = 0; i < allEls.length; i++) {
            var el = allEls[i];
            // Skip script/style/meta tags
            var tag = el.tagName;
            if (tag === 'SCRIPT' || tag === 'STYLE' || tag === 'META') continue;
            // Any real element with content = ready
            if (el.children.length > 0 || (el.textContent && el.textContent.trim().length > 0)) {
              return true;
            }
          }
          return false;
        }

        var obs = new MutationObserver(function(mutations) {
          // Check on every mutation if real content has appeared
          if (hasVisibleContent()) {
            dismiss();
          }
        });

        // subtree:true catches deeply nested React renders
        // childList:true catches element additions/removals
        // characterData:true catches text node changes (React text renders)
        obs.observe(root, { childList: true, subtree: true, characterData: true });

        // Safety: force-dismiss after 8s regardless of content state
        // This prevents the shell from blocking the UI if something goes wrong
        setTimeout(function() {
          if (!dismissed) {
            console.warn('[HTML Shell] Force-dismissed after 8s safety timeout');
            dismiss();
          }
        }, 8000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
